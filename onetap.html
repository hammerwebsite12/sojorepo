<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Successful Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Arial, sans-serif;
      padding: 20px;
      overflow-x: hidden;
    }

    /* ── Particle canvas ── */
    #particles {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      width: 100%;
      max-width: 720px;
    }

    /* ── Checkmark ── */
    .check-wrap {
      width: 100px;
      height: 100px;
      background: radial-gradient(circle, #00ff88 0%, #00cc66 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 40px rgba(0, 255, 136, 0.6), 0 0 80px rgba(0, 255, 136, 0.2);
      animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) both,
                 pulse 2.5s ease-in-out 0.8s infinite;
    }

    .check-wrap svg {
      width: 52px;
      height: 52px;
    }

    .check-path {
      stroke-dasharray: 80;
      stroke-dashoffset: 80;
      animation: drawCheck 0.6s ease 0.5s forwards;
    }

    @keyframes drawCheck {
      to { stroke-dashoffset: 0; }
    }

    @keyframes popIn {
      0%   { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 40px rgba(0, 255, 136, 0.6), 0 0 80px rgba(0, 255, 136, 0.2); }
      50%       { box-shadow: 0 0 60px rgba(0, 255, 136, 0.9), 0 0 120px rgba(0, 255, 136, 0.4); }
    }

    /* ── Heading ── */
    .heading {
      text-align: center;
      opacity: 0;
      animation: slideUp 0.7s ease 0.8s forwards;
    }

    .heading h1 {
      font-size: clamp(2rem, 8vw, 3.5rem);
      font-weight: 900;
      letter-spacing: 3px;
      text-transform: uppercase;
      background: linear-gradient(90deg, #00ff88, #00ccff, #00ff88);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: slideUp 0.7s ease 0.8s forwards,
                 shimmer 3s linear 1.5s infinite;
    }

    .heading p {
      margin-top: 8px;
      font-size: clamp(0.85rem, 3vw, 1rem);
      color: #888;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    @keyframes slideUp {
      0%   { opacity: 0; transform: translateY(30px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes shimmer {
      0%   { background-position: 0% center; }
      100% { background-position: 200% center; }
    }

    /* ── Video ── */
    .video-wrap {
      width: 100%;
      border-radius: 16px;
      overflow: hidden;
      border: 2px solid rgba(0, 255, 136, 0.3);
      box-shadow: 0 0 30px rgba(0, 255, 136, 0.15), 0 8px 40px rgba(0,0,0,0.6);
      opacity: 0;
      animation: slideUp 0.7s ease 1.2s forwards;
      position: relative;
      cursor: pointer;
    }

    .video-wrap::before {
      content: '';
      display: block;
      padding-top: 56.25%; /* 16:9 */
    }

    .video-wrap iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    /* ── Link button ── */
    .yt-link {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 28px;
      border-radius: 50px;
      background: linear-gradient(135deg, #ff0000, #cc0000);
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 0.5px;
      box-shadow: 0 4px 20px rgba(255, 0, 0, 0.4);
      transition: transform 0.2s, box-shadow 0.2s;
      opacity: 0;
      animation: slideUp 0.7s ease 1.5s forwards;
    }

    .yt-link:hover, .yt-link:active {
      transform: translateY(-2px) scale(1.03);
      box-shadow: 0 8px 30px rgba(255, 0, 0, 0.55);
    }

    .yt-link svg { flex-shrink: 0; }
  </style>
</head>
<body>

  <canvas id="particles"></canvas>

  <div class="content">

    <!-- Animated checkmark -->
    <div class="check-wrap">
      <svg viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polyline class="check-path" points="10,27 22,39 42,16"
          stroke="white" stroke-width="5.5"
          stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <!-- Text -->
    <div class="heading">
      <h1>Successful Test</h1>
      <p>Operation completed &mdash; everything is working</p>
    </div>

    <!-- Embedded video player -->
    <div class="video-wrap">
      <iframe
        src="https://www.youtube.com/embed/otzXtiodkEE?rel=0&modestbranding=1"
        title="Successful Test Video"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        allowfullscreen>
      </iframe>
    </div>

    <!-- YouTube link -->
    <a class="yt-link" href="https://youtu.be/otzXtiodkEE?si=M_FJWXBghcYbycpM" target="_blank" rel="noopener">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
        <path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.6A3 3 0 0 0 .5 6.2C0 8.1 0 12 0 12s0 3.9.5 5.8a3 3 0 0 0 2.1 2.1C4.5 20.5 12 20.5 12 20.5s7.5 0 9.4-.6a3 3 0 0 0 2.1-2.1C24 15.9 24 12 24 12s0-3.9-.5-5.8zM9.8 15.5V8.5l6.3 3.5-6.3 3.5z"/>
      </svg>
      Watch on YouTube
    </a>

  </div>

  <script>
    // Floating particles background
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let W, H, particles = [];

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    function rand(min, max) { return Math.random() * (max - min) + min; }

    for (let i = 0; i < 55; i++) {
      particles.push({
        x: rand(0, window.innerWidth),
        y: rand(0, window.innerHeight),
        r: rand(1, 3),
        dx: rand(-0.4, 0.4),
        dy: rand(-0.6, -0.1),
        alpha: rand(0.2, 0.7),
        color: Math.random() > 0.5 ? '0,255,136' : '0,204,255'
      });
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${p.color},${p.alpha})`;
        ctx.fill();
        p.x += p.dx;
        p.y += p.dy;
        if (p.y < -10) { p.y = H + 10; p.x = rand(0, W); }
        if (p.x < -10) p.x = W + 10;
        if (p.x > W + 10) p.x = -10;
      });
      requestAnimationFrame(draw);
    }
    draw();
  </script>

</body>
</html>
